<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>통합 정보 관리소</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    
    <script>
        window.SB_URL = "https://dauzxxzmzcfwuzbbazhw.supabase.co"; 
        window.SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRhdXp4eHptemNmd3V6YmJhemh3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1NzQxNjAsImV4cCI6MjA5MzE1MDE2MH0.2qcnrpKeVz3Aa9CiWyjGDfxDcd6cVIFYVttEoQt3rkA";
    </script>

    <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
    <script>eruda.init();</script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        * { box-sizing: border-box; font-family: 'Noto Sans KR', sans-serif; margin: 0; padding: 0; }
        body { background-color: #f0f2f5; display: flex; justify-content: center; padding: 20px; }
        .dashboard-container { width: 100%; max-width: 460px; background-color: #f8f9fa; min-height: 100vh; border-radius: 24px; padding: 20px; box-shadow: 0 8px 32px rgba(0,0,0,0.05); }
        .header-section { margin-bottom: 24px; }
        .header-title { font-size: 24px; font-weight: 700; color: #000000; display: flex; align-items: center; gap: 8px; margin-bottom: 20px; }
        .tab-menu { display: flex; background-color: #dee2e6; border-radius: 12px; padding: 4px; gap: 4px; }
        .tab-item { flex: 1; text-align: center; padding: 14px 0; font-size: 14px; font-weight: 700; color: #495057; cursor: pointer; border-radius: 10px; transition: all 0.15s ease; }
        .tab-item.active { background-color: #1a62e7; color: #ffffff; }
        .content-panel { display: none; }
        .content-panel.active { display: block; }
        .card { background: #ffffff; border-radius: 20px; padding: 24px 20px; box-shadow: 0 4px 16px rgba(0,0,0,0.02); margin-bottom: 20px; }
        .form-group { display: flex; flex-direction: column; gap: 14px; }
        .form-select, .form-input, .form-textarea { width: 100%; border: 1px solid #ced4da; border-radius: 12px; padding: 14px 16px; font-size: 15px; color: #212529; background-color: #ffffff; outline: none; transition: border-color 0.2s; }
        .form-select { background-color: #e9ecef; cursor: pointer; }
        .form-select:focus, .form-input:focus, .form-textarea:focus { border-color: #1a62e7; }
        .form-textarea { resize: none; height: 110px; }
        .btn-submit { width: 100%; background-color: #1a62e7; color: #ffffff; border: none; border-radius: 12px; padding: 16px 0; font-size: 16px; font-weight: 700; cursor: pointer; transition: background-color 0.2s; margin-top: 6px; }
        .list-container-card { background: #ffffff; border-radius: 20px; padding: 24px 20px; box-shadow: 0 4px 16px rgba(0,0,0,0.02); margin-bottom: 20px; }
        .list-title { font-size: 17px; font-weight: 700; color: #212529; margin-bottom: 16px; }
        .data-list { list-style: none; display: flex; flex-direction: column; gap: 12px; }
        .data-item { padding: 16px; background-color: #f4f6f9; border-radius: 14px; font-size: 14px; color: #333333; font-weight: 500; line-height: 1.5; box-shadow: inset 3px 0px 0px #dee2e6, 0 4px 10px rgba(0,0,0,0.02); display: flex; flex-direction: column; gap: 4px; position: relative; }
        .data-item .item-sub { font-size: 12px; color: #868e96; font-weight: 400; }
        .btn-delete-item { position: absolute; top: 14px; right: 14px; background: #ffe3e3; color: #e03131; border: none; padding: 4px 8px; font-size: 11px; font-weight: 700; border-radius: 6px; cursor: pointer; transition: all 0.2s; }
        .btn-delete-item:hover { background: #fa5252; color: #ffffff; }
        .calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .nav-btn-group { display: flex; gap: 6px; }
        .btn-nav { background: #e9ecef; border: none; width: 36px; height: 36px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .current-month { font-size: 18px; font-weight: 700; }
        .btn-today { background: #e9ecef; border: none; padding: 8px 14px; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; }
        .important-schedule-section { background-color: #f3f0ff; border-radius: 12px; padding: 14px; margin-bottom: 20px; }
        .schedule-section-title { display: flex; justify-content: space-between; align-items: center; font-size: 13px; font-weight: 700; color: #5c36cc; margin-bottom: 10px; }
        .schedule-count { font-size: 11px; background: #ffffff; padding: 2px 8px; border-radius: 10px; }
        .schedule-list { display: flex; flex-direction: column; gap: 8px; }
        .schedule-item { display: flex; align-items: center; justify-content: space-between; background: #ffffff; padding: 10px 12px; border-radius: 8px; }
        .schedule-info-block { display: flex; align-items: center; gap: 4px; flex: 1; overflow: hidden; }
        .schedule-date-badge { font-size: 12px; font-weight: 700; color: #5c36cc; min-width: 50px; }
        .schedule-text { font-size: 13px; color: #343a40; font-weight: 500; white-space: nowrap; text-overflow: ellipsis; overflow: hidden; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); row-gap: 16px; text-align: center; }
        .weekday { font-size: 12px; color: #868e96; padding-bottom: 10px; }
        .day { font-size: 13px; min-height: 52px; display: flex; flex-direction: column; align-items: center; position: relative; }
        .day.other-month { color: #dee2e6; }
        .event-container { width: 100%; display: flex; flex-direction: column; gap: 2px; margin-top: 4px; padding: 0 2px; overflow: hidden; }
        .event-badge { font-size: 9px; color: #ffffff; background-color: #5c36cc; padding: 2px 4px; border-radius: 4px; text-align: center; white-space: nowrap; text-overflow: ellipsis; overflow: hidden; width: 100%; }
    </style>
</head>
<body>

<div class="dashboard-container">
    <div class="header-section">
        <h1 class="header-title">📂 통합 정보 관리소</h1>
        <div class="tab-menu">
            <div class="tab-item active" onclick="switchTab(0)">민원 관리</div>
            <div class="tab-item" onclick="switchTab(1)">메모 & 공부 내용</div>
            <div class="tab-item" onclick="switchTab(2)">일정 관리</div>
        </div>
    </div>

    <div class="content-panel active" id="panel-0">
        <div class="card">
            <div class="form-group">
                <select class="form-select" id="complaint-region">
                    <option>서귀포시</option>
                    <option>안덕면</option>
                    <option>대정읍</option>
                    <option>남원읍</option>
                </select>
                <input type="text" class="form-input" id="complaint-title" placeholder="민원 제목">
                <textarea class="form-textarea" id="complaint-content" placeholder="민원 내용"></textarea>
                <textarea class="form-textarea" id="complaint-reply" placeholder="답변 내용"></textarea>
                <button class="btn-submit" onclick="submitComplaint()">민원 등록</button>
            </div>
        </div>
        <div class="list-container-card">
            <h2 class="list-title">📋 접수된 민원 현황 목록</h2>
            <ul class="data-list" id="complaint-list-target"></ul>
        </div>
    </div>

    <div class="content-panel" id="panel-1">
        <div class="card">
            <div class="form-group">
                <select class="form-select" id="memo-category">
                    <option>의회 공부</option>
                    <option>메모 복습</option>
                </select>
                <input type="date" class="form-input" id="memo-date">
                <input type="text" class="form-input" id="memo-title" placeholder="주제 및 제목">
                <textarea class="form-textarea" id="memo-content" placeholder="상세 메모 요약" style="height: 150px;"></textarea>
                <button class="btn-submit" onclick="submitMemo()">메모 등록</button>
            </div>
        </div>
        <div class="list-container-card">
            <h2 class="list-title">📋 저장된 메모 및 공부 목록</h2>
            <ul class="data-list" id="memo-list-target"></ul>
        </div>
    </div>

    <div class="content-panel" id="panel-2">
        <div class="card" style="padding: 16px 12px; margin-bottom: 20px;">
            <div class="calendar-header">
                <div class="nav-btn-group">
                    <button class="btn-nav" onclick="changeMonth(-1)">&lt;</button>
                    <button class="btn-nav" onclick="changeMonth(1)">&gt;</button>
                </div>
                <div class="current-month" id="calendarYearMonth">2026년 6월</div>
                <button class="btn-today" onclick="goToday()">today</button>
            </div>
            <div class="important-schedule-section">
                <div class="schedule-section-title">
                    <span>📅 이달의 주요 일정</span>
                    <span class="schedule-count" id="importantCount">총 0건</span>
                </div>
                <div class="schedule-list" id="importantScheduleList"></div>
            </div>
            <div class="calendar-grid" id="calendar-grid-target"></div>
        </div>
        <div class="card" style="padding: 20px;">
            <div style="font-size: 16px; font-weight: 700; color: #212529; margin-bottom: 14px;">📅 새 일정 추가하기</div>
            <div class="form-group">
                <input type="date" class="form-input" id="schedule-date">
                <input type="text" class="form-input" id="schedule-title" placeholder="일정 제목">
                <button class="btn-submit" onclick="submitSchedule()" style="background-color: #5c36cc;">일정 등록</button>
            </div>
        </div>
    </div>
</div>

<script>
    let sb = null;

    function startConnection() {
        if (typeof supabase !== 'undefined' && window.SB_URL && window.SB_KEY) {
            sb = supabase.createClient(window.SB_URL, window.SB_KEY);
            loadAllData();
        } else {
            setTimeout(startConnection, 50);
        }
    }

    function loadAllData() {
        loadComplaints();
        loadMemos();
        loadSchedules();
    }

    function switchTab(index) {
        document.querySelectorAll('.tab-item').forEach((tab, i) => tab.classList.toggle('active', i === index));
        document.querySelectorAll('.content-panel').forEach((panel, i) => panel.classList.toggle('active', i === index));
    }

    // 민원 로직
    async function loadComplaints() {
        const target = document.getElementById('complaint-list-target');
        if (!sb) return;
        const { data, error } = await sb.from('complaints').select('*').order('id', { ascending: false });
        if (error || !data || data.length === 0) {
            target.innerHTML = '<li style="text-align:center; color:#868e96; font-size:13px; padding:10px 0;">민원이 없습니다.</li>';
            return;
        }
        let html = '';
        data.forEach(item => {
            let replyHtml = item.reply ? `<div class="item-sub" style="color:#e64980; font-weight:700;">답변: ${item.reply}</div>` : '';
            html += `<li class="data-item">
                <button class="btn-delete-item" onclick="deleteComplaint(${item.id})">삭제</button>
                <div style="font-weight:700; color:#1a62e7; padding-right:40px;">📌 [${item.region}] ${item.title}</div>
                <div class="item-sub" style="color:#212529; margin-top:4px;">내용: ${item.content}</div>
                ${replyHtml}
            </li>`;
        });
        target.innerHTML = html;
    }

    async function submitComplaint() {
        const region = document.getElementById('complaint-region').value;
        const title = document.getElementById('complaint-title').value;
        const content = document.getElementById('complaint-content').value;
        const reply = document.getElementById('complaint-reply').value;
        if(!title || !content) return alert('내용을 입력하세요.');

        const { error } = await sb.from('complaints').insert([{ id: Date.now(), region, title, content, reply }]);
        if(error) return alert('등록 실패: ' + error.message);
        
        alert('등록 완료');
        document.getElementById('complaint-title').value = '';
        document.getElementById('complaint-content').value = '';
        document.getElementById('complaint-reply').value = '';
        loadComplaints();
    }

    async function deleteComplaint(id) {
        if(!confirm('정말 삭제하시겠습니까?')) return;
        const { error } = await sb.from('complaints').delete().eq('id', id);
        if(error) return alert('삭제 실패: ' + error.message);
        alert('삭제되었습니다.');
        loadComplaints();
    }

    // 메모 로직
    async function loadMemos() {
        const target = document.getElementById('memo-list-target');
        if (!sb) return;
        const { data, error } = await sb.from('memos').select('*').order('id', { ascending: false });
        if (error || !data || data.length === 0) {
            target.innerHTML = '<li style="text-align:center; color:#868e96; font-size:13px; padding:10px 0;">메모가 없습니다.</li>';
            return;
        }
        let html = '';
        data.forEach(item => {
            html += `<li class="data-item">
                <button class="btn-delete-item" onclick="deleteMemo(${item.id})">삭제</button>
                <div style="font-weight:700; color:#10b981; padding-right:40px;">📝 [${item.category}] ${item.title}</div>
                <div class="item-sub" style="font-weight:bold; color:#4b5563;">일자: ${item.memo_date}</div>
                <div class="item-sub" style="color:#212529; white-space:pre-wrap; margin-top:4px;">${item.content}</div>
            </li>`;
        });
        target.innerHTML = html;
    }

    async function submitMemo() {
        const category = document.getElementById('memo-category').value;
        const memo_date = document.getElementById('memo-date').value;
        const title = document.getElementById('memo-title').value;
        const content = document.getElementById('memo-content').value;
        if(!memo_date || !title || !content) return alert('모두 입력하세요.');

        const { error } = await sb.from('memos').insert([{ id: Date.now(), category, memo_date, title, content }]);
        if(error) return alert('등록 실패: ' + error.message);

        alert('저장 완료');
        document.getElementById('memo-title').value = '';
        document.getElementById('memo-content').value = '';
        loadMemos();
    }

    async function deleteMemo(id) {
        if(!confirm('정말 삭제하시겠습니까?')) return;
        const { error } = await sb.from('memos').delete().eq('id', id);
        if(error) return alert('삭제 실패: ' + error.message);
        alert('삭제되었습니다.');
        loadMemos();
    }

    // 일정 로직
    let currentViewingYear = 2026;
    let currentViewingMonth = 6; 

    async function loadSchedules() {
        const listContainer = document.getElementById("importantScheduleList");
        const countBadge = document.getElementById("importantCount");
        const gridTarget = document.getElementById("calendar-grid-target");
        if (!sb) return;

        document.getElementById("calendarYearMonth").innerText = `${currentViewingYear}년 ${currentViewingMonth}월`;
        const lastDayOfCurrentMonth = new Date(currentViewingYear, currentViewingMonth, 0).getDate();
        const startDayOfWeek = new Date(currentViewingYear, currentViewingMonth - 1, 1).getDay();
        const lastDayOfPrevMonth = new Date(currentViewingYear, currentViewingMonth - 1, 0).getDate();

        const startDate = `${currentViewingYear}-${String(currentViewingMonth).padStart(2, '0')}-01`;
        const endDate = `${currentViewingYear}-${String(currentViewingMonth).padStart(2, '0')}-${String(lastDayOfCurrentMonth).padStart(2, '0')}`;

        const { data, error } = await sb.from('schedules').select('*').gte('schedule_date', startDate).lte('schedule_date', endDate).order('schedule_date', { ascending: true });

        if (error || !data || data.length === 0) {
            countBadge.innerText = '총 0건';
            listContainer.innerHTML = '<div style="text-align:center; color:#868e96; font-size:12px; padding:10px 0;">일정이 없습니다.</div>';
        } else {
            countBadge.innerText = `총 ${data.length}건`;
            let listHtml = '';
            data.forEach(item => {
                const dateParts = item.schedule_date.split('-');
                listHtml += `<div class="schedule-item">
                    <div class="schedule-info-block">
                        <div class="schedule-date-badge">📅 ${dateParts[1]}/${dateParts[2]}</div>
                        <div class="schedule-text">${item.title}</div>
                    </div>
                    <button class="btn-delete-item" style="position:static; padding:2px 6px; font-size:10px;" onclick="deleteSchedule(${item.id})">삭제</button>
                </div>`;
            });
            listContainer.innerHTML = listHtml;
        }

        let gridHtml = `<div class="weekday">일</div><div class="weekday">월</div><div class="weekday">화</div><div class="weekday">수</div><div class="weekday">목</div><div class="weekday">금</div><div class="weekday">토</div>`;
        for (let i = startDayOfWeek - 1; i >= 0; i--) gridHtml += `<div class="day other-month">${lastDayOfPrevMonth - i}일</div>`;
        for (let d = 1; d <= lastDayOfCurrentMonth; d++) {
            const currentFormatDate = `${currentViewingYear}-${String(currentViewingMonth).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
            let badgeHtml = '<div class="event-container">';
            if (data) {
                data.forEach(ev => { if (ev.schedule_date === currentFormatDate) badgeHtml += `<div class="event-badge">${ev.title}</div>`; });
            }
            badgeHtml += '</div>';
            gridHtml += `<div class="day">${d}일 ${badgeHtml}</div>`;
        }
        const remainingCells = (7 - ((startDayOfWeek + lastDayOfCurrentMonth) % 7)) % 7;
        for (let nextD = 1; nextD <= remainingCells; nextD++) gridHtml += `<div class="day other-month">${nextD}일</div>`;
        gridTarget.innerHTML = gridHtml;
    }

    async function submitSchedule() {
        const schedule_date = document.getElementById('schedule-date').value;
        const title = document.getElementById('schedule-title').value;
        if(!schedule_date || !title) return alert('날짜와 제목을 입력하세요.');

        const { error } = await sb.from('schedules').insert([{ id: Date.now(), schedule_date, title }]);
        if(error) return alert('등록 실패: ' + error.message);

        alert('등록 완료');
        document.getElementById('schedule-title').value = '';
        loadSchedules();
    }

    async function deleteSchedule(id) {
        if(!confirm('정말 삭제하시겠습니까?')) return;
        const { error } = await sb.from('schedules').delete().eq('id', id);
        if(error) return alert('삭제 실패: ' + error.message);
        alert('삭제되었습니다.');
        loadSchedules();
    }

    function changeMonth(dir) {
        currentViewingMonth += dir;
        if(currentViewingMonth > 12) { currentViewingMonth = 1; currentViewingYear++; }
        else if(currentViewingMonth < 1) { currentViewingMonth = 12; currentViewingYear--; }
        loadSchedules();
    }

    function goToday() {
        const today = new Date();
        currentViewingYear = today.getFullYear();
        currentViewingMonth = today.getMonth() + 1;
        loadSchedules();
    }

    window.addEventListener('DOMContentLoaded', () => {
        const todayStr = new Date().toISOString().split('T')[0];
        document.getElementById('memo-date').value = todayStr;
        document.getElementById('schedule-date').value = todayStr;
        startConnection();
    });
</script>
</body>
</html>
