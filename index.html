<!DOCTYPE html>
<html lang="ko">
<head>
  <link rel="icon" href="logo.png" type="image/png">
  <link rel="apple-touch-icon" href="logo.png">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="ARC2026">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ARC2026</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Pretendard', Arial, sans-serif; background: #f8f9fa; color: #333; }

    /* 상단 타이틀 */
    .header { background: #333; color: white; text-align: center; padding: 18px; font-size: 20px; font-weight: bold; letter-spacing: 2px; }

    /* 위치 상태 바 */
    .loc-bar { display: flex; align-items: center; justify-content: center; gap: 8px; margin: 16px auto; padding: 12px; border-radius: 30px; font-size: 13px; font-weight: bold; max-width: 360px; background: #f0f0f0; color: #888; }
    .loc-bar.ok { background: #e6f9ee; color: #27ae60; border: 1px solid #27ae60; }
    .loc-bar.bad { background: #fdecea; color: #e74c3c; border: 1px solid #e74c3c; }
    .loc-dot { width: 10px; height: 10px; border-radius: 50%; background: currentColor; flex-shrink: 0; }

    /* 출석 멤버 그리드 */
    .member-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; max-width: 400px; margin: 0 auto 24px auto; padding: 0 16px; }
    .member-card { background: white; border: 2px solid #ddd; border-radius: 14px; padding: 22px 10px 18px; text-align: center; cursor: pointer; transition: 0.15s; box-shadow: 0 2px 8px rgba(0,0,0,0.07); }
    .member-card:active { transform: scale(0.96); background: #f0f0f0; }
    .member-card b { font-size: 18px; color: #333; display: block; }
    .member-card small { color: #999; font-size: 12px; display: block; margin-top: 5px; }

    /* 대체런 버튼 */
    .sub-btn { display: block; width: calc(100% - 24px); max-width: 376px; margin: 0 auto 8px; padding: 10px; background: #fff3cd; border: 1px dashed #e6a817; border-radius: 10px; color: #b8860b; font-size: 13px; font-weight: bold; cursor: pointer; text-align: center; }
    .sub-btn:active { background: #ffe69c; }

    /* 랭킹 섹션 */
    .section { background: white; border-radius: 16px; max-width: 400px; margin: 0 auto 20px; padding: 20px 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
    .section-title { font-size: 15px; font-weight: bold; margin-bottom: 4px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .penalty-badge { font-size: 12px; color: #e03131; background: #fff5f5; border: 1px solid #ffc9c9; padding: 2px 6px; border-radius: 4px; }

    .ranking-item { display: flex; align-items: center; justify-content: space-between; padding: 11px 4px; border-bottom: 1px solid #f0f0f0; }
    .ranking-item:last-child { border-bottom: none; }
    .rank-num { font-weight: 800; width: 22px; color: #ccc; flex-shrink: 0; }
    .rank-1 .rank-num { color: #f1c40f; font-size: 20px; }
    .rank-2 .rank-num { color: #aaa; }
    .rank-3 .rank-num { color: #cd7f32; }
    .rank-info { flex: 1; min-width: 0; text-align: left; margin-left: 6px; }
    .rank-name { font-size: 16px; font-weight: bold; }
    .rank-last { font-size: 11px; color: #888; background: #f5f5f5; padding: 1px 5px; border-radius: 4px; display: inline-block; margin-top: 2px; }
    .rank-val { font-size: 13px; text-align: right; flex-shrink: 0; }
    .rank-val .rate { font-weight: bold; color: #27ae60; }
    .penalty-row .rank-val .rate { color: #aaa; }

    .detail-btn { font-size: 11px; background: #f1f3f5; border: 1px solid #dee2e6; color: #555; padding: 3px 7px; border-radius: 5px; cursor: pointer; margin-right: 6px; white-space: nowrap; }

    /* 현황 모달 */
    .modal-bg { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:9999; align-items:center; justify-content:center; padding:20px; }
    .modal-bg.active { display: flex; }
    .modal-box { background: white; width:100%; max-width:320px; border-radius:14px; padding:20px; box-shadow:0 4px 20px rgba(0,0,0,0.2); }
    .modal-box h3 { text-align:center; font-size:16px; margin-bottom:14px; }
    .modal-box table { width:100%; border-collapse:collapse; font-size:13px; }
    .modal-box th { background:#f8f9fa; padding:7px; border-bottom:2px solid #eee; color:#555; }
    .modal-box td { padding:7px; border-bottom:1px solid #f0f0f0; text-align:center; }
    .modal-close { margin-top:14px; width:100%; padding:10px; background:#333; color:white; border:none; border-radius:8px; font-weight:bold; cursor:pointer; }

    /* 대체런 선택 모달 */
    .pick-modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:9999; align-items:center; justify-content:center; padding:20px; }
    .pick-modal.active { display:flex; }
    .pick-box { background:white; width:100%; max-width:320px; border-radius:16px; padding:24px 20px; text-align:center; }
    .pick-box h3 { font-size:17px; margin-bottom:6px; }
    .pick-box p { font-size:13px; color:#888; margin-bottom:20px; }
    .pick-btns { display:flex; flex-direction:column; gap:10px; }
    .pick-btn { padding:14px; border:none; border-radius:10px; font-size:15px; font-weight:bold; cursor:pointer; }
    .pick-btn.regular { background:#333; color:white; }
    .pick-btn.sub { background:#fff3cd; color:#b8860b; border:1px dashed #e6a817; }
    .pick-btn.cancel { background:#f8f9fa; color:#888; }
  </style>
</head>
<body>

<div class="header">🏃 ARC 2026</div>

<div style="padding: 16px 0 0;">
  <!-- 카운트다운 -->
  <div style="display:flex; flex-direction:column; align-items:center; justify-content:center; margin: 0 16px 10px; padding: 12px 16px; border-radius: 12px; background: #1a1a2e; border: 1px solid #e74c3c;">
    <div style="font-size:11px; color:#aaa; margin-bottom:4px;">⚠️ 사이트 자동삭제 예정</div>
    <div id="countdownTimer" style="font-size:22px; font-weight:bold; font-family:monospace; letter-spacing:2px; color:#e74c3c;">00:00:00:00</div>
    <div style="font-size:11px; color:#888; margin-top:3px;">2026년 6월 27일 23:00까지</div>
  </div>

  <!-- 위치 상태 -->
  <div class="loc-bar" id="locBar">
    <span class="loc-dot"></span>
    <span id="locText">위치 확인 중...</span>
  </div>

  <!-- 멤버 출석 카드 -->
  <div class="member-grid" id="memberGrid"></div>

  <!-- 출석 현황 랭킹 -->
  <div class="section" style="margin: 0 16px 24px;">
    <div class="section-title">
      6월 출석 현황
      <span class="penalty-badge">40% 미만시 벌금 5만원</span>
    </div>
    <div id="rankingList" style="margin-top:12px;"></div>
  </div>
</div>

<!-- 현황 상세 모달 -->
<div class="modal-bg" id="detailModal">
  <div class="modal-box">
    <h3 id="detailModalTitle"></h3>
    <div id="detailModalBody"></div>
    <button class="modal-close" onclick="document.getElementById('detailModal').classList.remove('active')">닫기</button>
  </div>
</div>

<!-- 출석 종류 선택 모달 -->
<div class="pick-modal" id="pickModal">
  <div class="pick-box">
    <h3 id="pickModalName"></h3>
    <p>출석 종류를 선택하세요</p>
    <div class="pick-btns">
      <button class="pick-btn regular" onclick="confirmAttend(false)">✅ 정규 출석</button>
      <button class="pick-btn sub" onclick="confirmAttend(true)">🔄 대체런</button>
      <button class="pick-btn cancel" onclick="closePickModal()">취소</button>
    </div>
  </div>
</div>

<script>
  const MEMBERS = ['윤민혁','고영지','김민수','송지용','양원준','지항민','김해건','양지훈'];
  const TOTAL = 12;
  const MASTER_KEY = '0179';
  const TARGET = { lat: 33.2549408014355, lng: 126.32857041329 };
  const supabaseClient = window.supabase.createClient(
    "https://ndctjtuxpkwdldhqbnih.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5kY3RqdHV4cGt3ZGxkaHFibmloIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0MTgwMjAsImV4cCI6MjA5MDk5NDAyMH0.SrHCtqlNE4cgepGMw_NoPC56bnJIfV2_t7Hbmj5EXCY"
  );

  let locationOk = false;
  let allDates = {};
  let pendingName = null;

  window.onload = function() {
    checkLocation();
    loadData();
    startCountdown();
  };

  function startCountdown() {
    const target = new Date('2026-06-27T23:00:00+09:00').getTime();
    function update() {
      const now = Date.now();
      const diff = target - now;
      const el = document.getElementById('countdownTimer');
      if (diff <= 0) { el.textContent = '종료됨'; el.style.color = '#888'; return; }
      const d = Math.floor(diff / 86400000);
      const h = Math.floor((diff % 86400000) / 3600000);
      const m = Math.floor((diff % 3600000) / 60000);
      const s = Math.floor((diff % 60000) / 1000);
      el.textContent = `${String(d).padStart(2,'0')}일 ${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    }
    update();
    setInterval(update, 1000);
  }

  // ─── 위치 확인 ───────────────────────────────────────
  function checkLocation() {
    navigator.geolocation.getCurrentPosition(pos => {
      const d = getDist(pos.coords.latitude, pos.coords.longitude, TARGET.lat, TARGET.lng);
      locationOk = d <= 500;
      const bar = document.getElementById('locBar');
      bar.className = locationOk ? 'loc-bar ok' : 'loc-bar bad';
      document.getElementById('locText').textContent = locationOk ? `✅ 출석 가능 (${Math.round(d)}m)` : `📍 너무 멀어요 (${Math.round(d)}m)`;
    }, () => {
      document.getElementById('locText').textContent = '위치 권한 필요';
    }, { enableHighAccuracy: true });
  }

  function getDist(l1, g1, l2, g2) {
    const R = 6371000, dL = (l2-l1)*Math.PI/180, dG = (g2-g1)*Math.PI/180;
    const a = Math.sin(dL/2)**2 + Math.cos(l1*Math.PI/180)*Math.cos(l2*Math.PI/180)*Math.sin(dG/2)**2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  }

  // ─── 데이터 로드 ───────────────────────────────────────
  async function loadData() {
    const { data } = await supabaseClient.from('attendance').select('name, created_at').order('created_at', { ascending: false });

    const counts = {}, lastDate = {};
    allDates = {};
    MEMBERS.forEach(m => { counts[m] = 0; lastDate[m] = '-'; allDates[m] = []; });

    const weeks = ['일','월','화','수','목','금','토'];

    data?.forEach(r => {
      if (counts[r.name] === undefined) return;
      const d = new Date(r.created_at);
      if (d.getFullYear() !== 2026 || d.getMonth() + 1 !== 6) return;

      counts[r.name]++;
      const mm = String(d.getMonth()+1).padStart(2,'0');
      const dd = String(d.getDate()).padStart(2,'0');
      const wk = weeks[d.getDay()];
      const h = d.getHours(), m = d.getMinutes();
      const t = h * 60 + m;
      const isSub = !(t >= 1202 && t <= 1260);
      const label = `${mm}-${dd} (${wk})${isSub ? ' 대체런' : ''}`;
      allDates[r.name].push(label);
      if (lastDate[r.name] === '-') lastDate[r.name] = `${mm}-${dd} ${wk}`;
    });

    // 멤버 카드 렌더
    const STATUS = {
      '양원준': { label: '탈퇴', nameStyle: 'color:#aaa;', cardStyle: 'background:#555; cursor:default; opacity:0.6;' },
      '양지훈': { label: '미활동', nameStyle: 'color:#aaa;', cardStyle: 'background:#555; cursor:default; opacity:0.6;' },
      '김해건': { label: '질병', nameStyle: 'color:#aaa;', cardStyle: 'background:#555; cursor:default; opacity:0.6;' },
    };

    document.getElementById('memberGrid').innerHTML = MEMBERS.map(m => {
      const s = STATUS[m];
      return s ? `
        <div class="member-card" style="${s.cardStyle}">
          <b style="${s.nameStyle}">${m}</b>
          <small style="background:rgba(255,255,255,0.15); color:white; padding:2px 8px; border-radius:10px; margin-top:5px; display:inline-block;">${s.label}</small>
        </div>
      ` : `
        <div class="member-card" onclick="openPickModal('${m}')">
          <b>${m}</b>
          <small>${counts[m]}회 (${Math.round(counts[m]/TOTAL*100)}%)</small>
        </div>
      `;
    }).join('');

    // 랭킹 렌더
    const sorted = MEMBERS.map(n => ({
      name: n,
      count: counts[n],
      rate: Math.round(counts[n]/TOTAL*100),
      last: lastDate[n]
    })).sort((a,b) => b.count - a.count);

    const EXCLUDED = ['양원준', '김해건', '양지훈'];

    document.getElementById('rankingList').innerHTML = sorted.map((m, i) => {
      const isPenalty = m.rate < 40;
      const isExcluded = EXCLUDED.includes(m.name);
      return `
        <div class="ranking-item ${i===0?'rank-1':i===1?'rank-2':i===2?'rank-3':''} ${isPenalty&&!isExcluded?'penalty-row':''}">
          <span class="rank-num" style="${isExcluded?'color:#ccc;':''}">${i+1}</span>
          <div class="rank-info">
            <div class="rank-name" style="${isExcluded?'text-decoration:line-through;color:#bbb;':''}">${m.name}</div>
            ${isExcluded
              ? `<span class="rank-last" style="color:#bbb;">제외</span>`
              : `<span class="rank-last">최근: ${m.last}</span>`
            }
          </div>
          <button class="detail-btn" onclick="showDetail('${m.name}')">현황보기</button>
          <div class="rank-val" style="${isExcluded?'color:#ccc;':''}">${m.count}회 <span class="rate" style="${isExcluded?'color:#ccc;':''}">${m.rate}%</span></div>
        </div>
      `;
    }).join('');
  }

  // ─── 출석 종류 선택 모달 ───────────────────────────────
  function openPickModal(name) {
    if (!locationOk) { alert("위치 인증이 되지 않았습니다. 근처에서 시도해주세요."); return; }
    pendingName = name;
    document.getElementById('pickModalName').textContent = name + ' 님';
    document.getElementById('pickModal').classList.add('active');
  }

  function closePickModal() {
    pendingName = null;
    document.getElementById('pickModal').classList.remove('active');
  }

  // ─── 출석 처리 (정규 / 대체런) ────────────────────────
  async function confirmAttend(isSubstitute) {
    const name = pendingName;
    closePickModal();
    if (!name) return;

    const todayStr = new Date().toISOString().split('T')[0];
    const storageKey = `attended_${todayStr}`;
    const savedName = localStorage.getItem(storageKey);

    if (savedName) {
      if (savedName === name) {
        if (confirm(`오늘 [${name}]님으로 이미 출석하셨습니다.\n취소하고 다시 체크하시겠습니까?`)) {
          const { data: rec } = await supabaseClient.from('attendance').select('id').eq('name', name)
            .gte('created_at', todayStr).order('created_at', { ascending: false }).limit(1).single();
          if (rec) await supabaseClient.from('attendance').delete().eq('id', rec.id);
          localStorage.removeItem(storageKey);
          alert("출석 취소됐습니다.");
          loadData();
        }
      } else {
        alert(`이 기기에서 오늘 이미 [${savedName}]님으로 출석 완료됐습니다.`);
      }
      return;
    }

    const label = isSubstitute ? '대체런' : '정규 출석';
    if (!confirm(`[${name}]님, ${label}으로 출석 체크할까요?`)) return;

    // 대체런이면 새벽 1시 타임스탬프로 강제 삽입 (시간 기반 판별 로직 활용)
    let insertObj = { name };
    if (isSubstitute) {
      const now = new Date();
      // KST 기준 오전 1:00 → UTC로 변환 (KST = UTC+9)
      const subTime = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 1, 0, 0);
      insertObj.created_at = subTime.toISOString();
    }

    const { error } = await supabaseClient.from('attendance').insert([insertObj]);
    if (error) { alert("저장 중 오류가 발생했습니다."); return; }

    localStorage.setItem(storageKey, name);
    alert(`[${name}]님 ${label} 완료!`);
    loadData();
  }

  // ─── 현황 상세 모달 ────────────────────────────────────
  function showDetail(name) {
    const dates = allDates[name] || [];
    document.getElementById('detailModalTitle').textContent = name + ' 님의 출석 현황';
    if (dates.length === 0) {
      document.getElementById('detailModalBody').innerHTML = '<p style="text-align:center;color:#aaa;padding:16px 0;">출석 기록 없음</p>';
    } else {
      document.getElementById('detailModalBody').innerHTML = `
        <div style="max-height:260px;overflow-y:auto;">
          <table>
            <thead><tr><th>#</th><th>날짜 (요일)</th></tr></thead>
            <tbody>${dates.map((d,i) => `<tr><td style="color:#aaa">${i+1}</td><td>${d}</td></tr>`).join('')}</tbody>
          </table>
        </div>`;
    }
    document.getElementById('detailModal').classList.add('active');
  }
</script>
</body>
</html>
